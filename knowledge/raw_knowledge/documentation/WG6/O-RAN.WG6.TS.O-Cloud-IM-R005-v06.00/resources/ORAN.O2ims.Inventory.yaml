          description: List of timestamps when the measurement was deleted from a job. Multiple values may be present if deletion occurred at different times. The effective period of the measurement would be the times between a timeAdded and timeDeleted values.
          x-support-qualifier:    M
          x-isAlwaysPresent: false
          readOnly:          true
          x-isInvariant:        false
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          x-nullable:          true
          minItems:          0
          uniqueItems:        true
          items:            
            type: string
        isCurrentlyMeasured:
          type: boolean
          description: Indicates if the measurement is currently being measured by the contained performance job.
          x-support-qualifier:    M
          x-isAlwaysPresent: false
          readOnly:          true
          x-isInvariant:        true
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          default: true
