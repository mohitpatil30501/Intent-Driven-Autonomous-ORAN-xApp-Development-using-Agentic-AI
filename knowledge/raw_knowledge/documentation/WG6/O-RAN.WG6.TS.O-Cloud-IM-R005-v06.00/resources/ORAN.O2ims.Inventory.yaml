          x-isAlwaysPresent: false
          x-isInvariant:  false
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          x-nullable:  true
          default:  false
        heartbeatInterval:
          type: integer
          description: When the suppressRedundant is set to (true), if heartbeatInterval is a non-zero value then a duplicate value will be sent at least once per heatbeatInterval. The value shall be zero (0) or a value greater than or equal to the reportInterval.
          x-support-qualifier:  M
          x-isAlwaysPresent: false
          x-isInvariant:  false
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          x-nullable:  true
          minimum:  0
          default:  0
          x-units:  milliseconds
