              x-support-qualifier:  M
              readOnly:  true
              x-isInvariant:  true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              format:  uuid
            consumerPerformanceSubscriptionId:
              type: string
              description: Identifier optionally provided by the consumer for its purpose of managing performance data. This value could be the same across multiple instances of IMS subscription instances.
              x-support-qualifier:  M
              x-isAlwaysPresent: false
              x-isInvariant:  false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable:  true
            globalSubscriptionCriteria:
              type: array
              description: This is subscription criteria which will apply to each contained subscription.
              x-support-qualifier:  M
              x-isAlwaysPresent: false
              x-isInvariant:  false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable:  true
              x-isOrdered:  false
              minItems:  0
              uniqueItems:  true
              items: 
                $ref: '#/components/schemas/PerformanceSubscriptionCriteria'
            reportFormat:
              type: string
              description: Enumerated set of reporting mechanism for delivery of the data identified by the PerformanceSubscription.
              x-support-qualifier:  M
              x-isInvariant:  false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              enum:
                - NOTIFICATION
                - FILE
                - STREAM
            remoteFileLocation:
              type: string
              description: When the reportFormat is FILE this field is populated with the URL to the remote directory where the service is expected to push the requested performance files to a remote files system. If the reportFormat is not FILE, the field is empty or not present.
              x-support-qualifier:  M
              x-isAlwaysPresent: false
              x-isInvariant:  false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable:  true
              format:  uri
            callback:
              type: string
              description: The callback to send responses for modes NOTIFICATION, or the file notification for FILE. The field is not required if mode is STREAM.
              x-support-qualifier:  M
              x-isAlwaysPresent: false
              x-isInvariant:  false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable:  true
              format:  uri
            measurementReportingFrequencies:
              type: array
              description: The frequency that specified measurements are to be reported.
              x-support-qualifier:  M
              x-isInvariant:  false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-isOrdered:  false
              minItems:  1
              uniqueItems:  true
              items:  
                $ref: '#/components/schemas/PerformanceReportingFrequency'
