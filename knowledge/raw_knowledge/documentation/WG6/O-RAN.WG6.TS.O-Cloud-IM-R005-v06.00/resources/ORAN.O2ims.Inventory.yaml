          x-isAlwaysPresent: false
          readOnly:          true
          x-isInvariant:        false
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          default: true
      required:
      - resourceTypeId
      - resourceId
      - timeAdded
      - timeDeleted
      - isCurrentlyMeasured
