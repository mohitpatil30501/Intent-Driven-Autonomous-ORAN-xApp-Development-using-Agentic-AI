openapi: 3.0.1
info:
  title: ORAN.O2ims.Inventory Data Model
  version: 4.0.0
  description: >-
    OAS 3.0.1 definition of the O-RAN.O2ims.Inventory Namespace
  
    Copyright 2026 O-RAN ALLIANCE e.V.
    Licensed under the Standards Collaboration
    Copyright License Version 1.0 (the "License");
    you may not use this file except in compliance with the License.
    You may obtain a copy of the License at
    https://www.o-ran.org/sccl
  license:
    name: SCCL
    url: https://www.o-ran.org/sccl
externalDocs:
  description: O-RAN.WG6.TS.O-CLOUD-IM; O2 Information Model Specification
  url: https://specifications.o-ran.org/download?id=<>
paths: {}
components: 
  schemas:
    OCloud:
      allOf:
        - $ref: 'ORAN.O2ims.Common.yaml#/components/schemas/InformationObjectClass'
        - type: object
          properties:
            oCloudId:
              type: string
              description: Identifier of the O-Cloud instance. Internally generated within an O-Cloud instance.
              x-support-qualifier: M
              readOnly: true
              x-isInvariant: true
              x-inventoryNotification: false
              x-stateChangeNotification: false
              format: uuid
            globalCloudId:
              type: string
              description: Identifier of the O-Cloud instance assigned by the SMO. This identifier is globally unique across O-Cloud instances known to the SMO. This value was provided by the SMO at cloud genesis and is stored in the O-Cloud IMS Inventory.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              format:            uuid
            name:
              type: string
              description: Human readable name of the O-Cloud as identified by the SMO at cloud genesis.
              x-support-qualifier:    M
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
            description:
              type: string
              description: Human readable description of the O-Cloud as provided by the SMO at cloud genesis.
              x-support-qualifier:    M
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
            infrastructureManagementServicesEndPoint:
              type: string
              description: The URI root to all services provided by the O2ims interface. Inventory is one of these services.
              x-support-qualifier:    M
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
            resourceTypes:
              type: array
              description: List of Resource types.
              x-support-qualifier:    M
              x-isInvariant:        false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-isOrdered:        false
              minItems:          1
              uniqueItems:        true
              items:
                $ref: '#/components/schemas/ResourceType'
            locations:
              type: array
              description: List of locations where O-Cloud Sites are deployed or can be deployed.
              x-support-qualifier:    M
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
              x-isOrdered:        false
              minItems:          1
              uniqueItems:        true
              items:
                $ref: '#/components/schemas/Location'
            oCloudSites:
              type: array
              description: List of O-Cloud Sites that are known by the IMS and need to be exposed to the SMO for Homing.
              x-support-qualifier:    M
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
              x-isOrdered:        false
              minItems:          1
              uniqueItems:        true
              items:
                $ref: '#/components/schemas/OCloudSite'
            deploymentManagers:
              type: array
              description: List of Deployment managers
              x-support-qualifier:    M
              x-isInvariant:        false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-isOrdered:        false
              minItems:          1
              uniqueItems:        true
              items:
                $ref: '#/components/schemas/DeploymentManager'
            smoRegistrationService:
              type: string
              description: IP address endpoint or the URL of the SMO.
              x-support-qualifier:    M
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
              format:            uri
            extensions:
              type: array
              description: These are unspecified (not standardized) properties (keys) which are tailored by the vendor to extend the information provided about the O-Cloud.
              x-support-qualifier:    M
              x-isAlwaysPresent: false
              readOnly:          true
              x-isInvariant:        false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable:          true
              x-isOrdered:        false
              minItems:          0
              uniqueItems:        true
              items:
                $ref: 'ORAN.O2ims.Common.yaml#/components/schemas/AttributeValuePair'
          required:
          - oCloudId
          - globalCloudId
          - name
          - description
          - infrastructureManagementServicesEndPoint
          - resourceTypes
          - locations
          - oCloudSites
          - deploymentManagers
          - smoRegistrationService
    ResourceType:
      allOf:
        - $ref: 'ORAN.O2ims.Common.yaml#/components/schemas/InformationObjectClass'
        - type: object
          properties:
            resourceTypeId:
              type: string
              description: Identifier of the resource type. 
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              format:            uuid
            name:
              type: string
              description: Name of the resource type as identified by the cloud provider.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
            description:
              type: string
              description: Human readable description of the resource type.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
            vendor:
              type: string
              description: Name of the provider of the resource type.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
            model:
              type: string
              description: Information about the model of the resource type.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
            version:
              type: string
              description: Version or generation of the resource type.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
            alarmDictionaryId:
              type: string
              description: Identifier of the associated dictionary of alarms that can be generated by the resource type. If no alarms are reported against a resource of this resourceType then the alarmDictionaryId is set to null. 
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable:          true
              format:            uuid
            performanceDictionaryId:
              type: string
              description: Identifier of the associated dictionary of performance measurements that can be collected for the resource type. If the resource of this resourceType does not provide any measurements then the performanceDictionaryId is set to null. 
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable:          true
              format:            uuid
            resourceKind:
              type: string
              description: 'A value describing the "physicality" of the resource type.'
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              enum:
               - UNDEFINED
               - COMPUTE
               - NETWORKING
               - STORAGE
            resourceClass:
              type: string
              description: A value describing the functional role within the cloud for the resource type.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              enum:
               - UNDEFINED
               - COMPUTE
               - NETWORKING
               - STORAGE
            extensions:
              type: array
              description: These are unspecified (not standardized) properties (keys) which are tailored by the vendor to extend the information provided about the Resource Type.
              x-support-qualifier:    M
              x-isAlwaysPresent: false
              readOnly:          true
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable:          true
              x-isOrdered:        false
              minItems:          0
              uniqueItems:        true
              items:
                $ref: "ORAN.O2ims.Common.yaml#/components/schemas/AttributeValuePair"
          required:
          - resourceTypeId
          - name
          - description
          - vendor
          - model
          - version
    ResourcePool:
      allOf:
        - $ref: 'ORAN.O2ims.Common.yaml#/components/schemas/InformationObjectClass'
        - type: object
          properties:
            resourcePoolId:
              type: string
              description: Identifier of the resource pool. Locally unique within the scope of an O-Cloud instance.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              format:            uuid
            name:
              type: string
              description: Human readable name of the resource pool.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
            oCloudSiteId:
              type: string
              description: Identifier of the O-Cloud site the resource pool is a part of. 
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              format:            uuid
            description:
              type: string
              description: Human readable description of the resource pool.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
            resources:
              type: array
              description: List of resource IDs that are part of the resource pool.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
              x-isOrdered:        false
              minItems:          1
              uniqueItems:        true
              items:
                type: string
                format: uuid
            extensions:
              type: array
              description: These are unspecified (not standardized) properties (keys) which are tailored by the vendor to extend the information provided about the Resource Pool.
              x-support-qualifier:    M
              x-isAlwaysPresent: false
              readOnly:          true
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable:          true
              x-isOrdered:        false
              minItems:          0
              uniqueItems:        true
              items:
                $ref: "ORAN.O2ims.Common.yaml#/components/schemas/AttributeValuePair"
          required:
          - resourcePoolId
          - name
          - oCloudSiteId
          - description
          - resources
    Resource:
      allOf:
        - $ref: 'ORAN.O2ims.Common.yaml#/components/schemas/InformationObjectClass'
        - type: object
          properties:
            resourceId:
              type: string
              description: Identifier of the resource. Locally unique within the scope of an O-Cloud instance.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              format:            uuid
            description:
              type: string
              description: Human readable description of the resource.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
            resourceTypeId:
              type: string
              description: Reference to the resource type of the resource.
              x-support-qualifier:    M
              readOnly:           true
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              format:             uuid
            globalAssetId:
              type: string
              description: Identifier or serial number of the resource, if available. It is required only if the resource has been identified during its addition to the cloud as a reportable asset in the SMO inventory.
              x-support-qualifier:    M
              x-isAlwaysPresent: false
              readOnly:          true
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable:          true
            resourcePoolId:
              type: string
              description: Reference to the resource pool that the resource is part of.
              x-support-qualifier:      M
              readOnly:          true
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              format:            uuid
            elements:
              type: array
              description: The resource might be composed of smaller resources or other resource instances of a different type.
              x-support-qualifier:    M
              x-isAlwaysPresent: false
              readOnly:           true
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
              x-nullable:          true
              x-isOrdered:        false
              minItems:          0
              uniqueItems:        true
              items:
                $ref: "#/components/schemas/Resource"
            tags:
              type: array
              description: Keywords describing or classifying the resource instance.
              x-support-qualifier:    M
              x-isAlwaysPresent: false
              x-isInvariant:        false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable:          true
              x-isOrdered:        false
              minItems:          0
              uniqueItems:        true
              items:
                type: string
            groups:
              type: array
              description: Keywords denoting groups a resource belongs to.
              x-support-qualifier: M
              x-isAlwaysPresent: false
              x-isInvariant: false
              x-inventoryNotification: false
              x-stateChangeNotification: false
              x-nullable: true
              x-isOrdered: false
              minItems: 0
              uniqueItems: true
              items:
                type: string
            extensions:
              type: array
              description: These are unspecified (not standardized) properties (keys) which are tailored by the vendor to extend the information provided about the Resource.
              x-support-qualifier:    M
              x-isAlwaysPresent: false
              readOnly:          true
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable:          true
              x-isOrdered:        false
              minItems:          0
              uniqueItems:        true
              items:
                $ref: "ORAN.O2ims.Common.yaml#/components/schemas/AttributeValuePair"
          required:
          - resourceId
          - description
          - resourceTypeId
          - resourcePoolId
    DeploymentManager:
      allOf:
        - $ref: 'ORAN.O2ims.Common.yaml#/components/schemas/InformationObjectClass'
        - type: object
          properties:
            deploymentManagerId:
              type: string
              description: Identifier of the deployment manager. Locally unique within the scope of an O-Cloud instance.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              format:            uuid
            name:
              type: string
              description: Human readable name of the deployment manager as identified by the cloud provider.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
            description:
              type: string
              description: Human readable description of the deployment manageras populated by the cloud provider.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
            oCloudId:
              type: string
              description: Reference to the O-Cloud associated to the deployment manager.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        true
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
              format:             uuid
            deploymentManagementServicesEndpoint:
              type: string
              description: Endpoint to access the management services of the deployment manager.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
              format:            uri
            supportedLocations:
              type: array
              description: List of globalLocationIds that were assigned to resource pools that resources allocated to the service instance belong to.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
              x-isOrdered:        false
              minItems:          1
              uniqueItems:        true
              items:
                type: string
                format: uuid
            capabilities:
              type: array
              description: Information about the capabilities supported by this set of deployment management services based on the resources allocated to the service instance.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
              x-isOrdered:        false
              minItems:          0
              uniqueItems:        true
              items:
                $ref: 'ORAN.O2ims.Common.yaml#/components/schemas/AttributeValuePair'
            capacity:
              type: array
              description: Information about the available, allocated and reserved O-Cloud resources capacity allocated to the deployment manager.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
              x-isOrdered:        false
              minItems:          0
              uniqueItems:        true
              items:
                 $ref: 'ORAN.O2ims.Common.yaml#/components/schemas/AttributeValuePair'
            extensions:
              type: array
              description: These are unspecified (not standardized) properties (keys) which are tailored by the vendor to extend the information provided about the Resource Type.
              x-support-qualifier:    M
              x-isAlwaysPresent: false
              readOnly:          true
              x-isInvariant:        false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable:          true
              x-isOrdered:        false
              minItems:          0
              uniqueItems:        true
              items:
                $ref: 'ORAN.O2ims.Common.yaml#/components/schemas/AttributeValuePair'
          required:
          - deploymentManagerId
          - name
          - description
          - oCloudId
          - deploymentManagementServicesEndpoint
          - supportedLocations
          - capabilities
          - capacity
    InventorySubscription:
      allOf:
        - $ref: 'ORAN.O2ims.Common.yaml#/components/schemas/InformationObjectClass'
        - type: object
          properties:
            subscriptionId:
              type: string
              description: Identifier of the subscription. Locally unique within the scope of an O-Cloud instance.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              format:            uuid
            callback:
              type: string
              description: The URL of the callback to which notifications are delivered to.
              x-support-qualifier:    M
              x-isInvariant:        false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              format:            uri
            consumerSubscriptionId:
              type: string
              description: The consumer may provide its identifier for tracking, routing, or identifying the subscription used to report the event.
              x-support-qualifier:    M
              x-isAlwaysPresent: false
              x-isInvariant:        false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable:          true
              format:            uuid
            filter:
              type: string
              description: Criteria for events which do not need to be reported or will be filtered by the subscription notification service. Therefore, if a filter is not provided then all events are reported.
              x-support-qualifier:    M
              x-isAlwaysPresent: false
              x-isInvariant:        false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable:          true
          required:
          - subscriptionId
          - callback
    InfrastructureInventoryObject_:
      oneOf:
        - $ref: '#/components/schemas/OCloud'
        - $ref: '#/components/schemas/ResourceType'
        - $ref: '#/components/schemas/ResourcePool'
        - $ref: '#/components/schemas/Resource'
        - $ref: '#/components/schemas/DeploymentManager'
        - $ref: '#/components/schemas/Location'
        - $ref: '#/components/schemas/OCloudSite'
        - $ref: 'ORAN.O2ims.Artifacts.yaml#/components/schemas/ArtifactResourceType'
        - $ref: 'ORAN.O2ims.Artifacts.yaml#/components/schemas/ArtifactResource'
        - $ref: 'ORAN.O2ims.Cluster.yaml#/components/schemas/NodeClusterType'
        - $ref: 'ORAN.O2ims.Cluster.yaml#/components/schemas/NodeCluster'
        - $ref: 'ORAN.O2ims.Cluster.yaml#/components/schemas/ClusterResourceType'
        - $ref: 'ORAN.O2ims.Cluster.yaml#/components/schemas/ClusterResource'
        - $ref: 'ORAN.O2ims.Cluster.yaml#/components/schemas/ClusterResourceGroup'
        - $ref: 'ORAN.O2ims.Provisioning.yaml#/components/schemas/ProvisioningRequest'
        - $ref: 'ORAN.O2ims.Infrastructure.yaml#/components/schemas/InfrastructureResourceType'
        - $ref: 'ORAN.O2ims.Infrastructure.yaml#/components/schemas/InfrastructureResource'
        - $ref: 'ORAN.O2ims.Infrastructure.yaml#/components/schemas/Gateway'
        - $ref: 'ORAN.O2ims.Infrastructure.yaml#/components/schemas/SiteNetwork'
        - $ref: 'ORAN.O2ims.Infrastructure.yaml#/components/schemas/AttachmentCircuit'
        - $ref: 'ORAN.O2ims.Provisioning.yaml#/components/schemas/ProvisioningRequest'
      discriminator:
        propertyName: objectClass
    InfrastructureInventoryEvent:
      type: object
      required:
      - consumerSubscriptionId
      - notificationEventType
      - objectRef
      properties:
        consumerSubscriptionId:
          type: string
          description: The consumer may provide its identifier for tracking, routing, or identifying the subscription used to report the event.
          x-support-qualifier:    M
          readOnly:          true
          x-isInvariant:        true
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          format:            uuid      
        notificationEventType:
          type: string
          description: The type (CREATE, MODIFY, DELETE) of event being reported.  
          x-support-qualifier:    M
          readOnly:          true
          x-isInvariant:        false
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          format:            enum
          enum:
            - CREATE
            - MODIFY
            - DELETE
        objectRef:
          type: string
          description: The resultant reference to the object on which the action occured.
          x-support-qualifier:    M
          x-isAlwaysPresent: false
          readOnly:          true
          x-isInvariant:        false
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          x-nullable:          true
          format:            url
        priorObjectState:
          allOf:
            - $ref: '#/components/schemas/InfrastructureInventoryObject_'
            - type: object
              description: If the Event type is 'MODIFY' or 'DELETE' this this field will be populated with a copy of the object prior to the event.
              x-support-qualifier:    M
              x-isAlwaysPresent: false
              readOnly:          true
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable:          true
        postObjectState:
          allOf:
            - $ref: '#/components/schemas/InfrastructureInventoryObject_'
            - type: object
              description: If the Event type is 'CREATE' or 'MODIFY' this this field will be populated with a copy of the object after the event.
              x-support-qualifier:    M
              x-isAlwaysPresent: false
              readOnly:          true
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable:          true
    OCloudAvailableNotification:
      type: object
      properties:
        globalCloudId:
          type: string
          description: Identifier of the O-Cloud instance assigned by the SMO. This identifier is globally unique across O-Cloud instances known to the SMO. This value was provided by the SMO at cloud genesis and is stored in the O-Cloud IMS Inventory.
          x-support-qualifier:    M
          readOnly:          true
          x-isInvariant:        true
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          format:            uuid
        oCloudId:
          type: string
          description: Identifier of the O-Cloud instance. Unique within an O-Cloud instance.
          x-support-qualifier:    M
          readOnly:          true
          x-isInvariant:        true
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          format:            uuid
        IMS_EP:
          type: string
          description: URL to the resource within the O-Cloud for other attributes.
          x-support-qualifier:    M
          readOnly:          true
          x-isInvariant:        true
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          format:            uri
      required:
      - globalCloudId
      - oCloudId
      - IMS_EP
    AlarmEventRecord:
      type: object
      properties:
        alarmEventRecordId:
          type: string
          description: Identifier of an entry in the AlarmEventRecord. Locally unique within the scope of an O-Cloud instance.
          x-support-qualifier:    M
          readOnly:          true
          x-isInvariant:        true
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          format:            uuid
        resourceTypeId:
          type: string
          description: A reference to the type of resource which caused the alarm.
          x-support-qualifier:    M
          readOnly:          true
          x-isInvariant:        true
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          format:            uuid    
        resourceId:
          type: string
          description: A reference to the resource instance which caused the alarm.
          x-support-qualifier:    M
          readOnly:          true
          x-isInvariant:        true
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          format:            uuid
        alarmDefinitionId:
          type: string
          description: A reference to the Alarm Definition record in the Alarm Dictionary associated with the referenced Resource Type.
          x-support-qualifier:    M
          readOnly:          true
          x-isInvariant:        true
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
        probableCauseId:
          type: string
          description: A reference to the ProbableCause of the Alarm.
          x-support-qualifier:    M
          readOnly:          true
          x-isInvariant:        true
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
        alarmRaisedTime:
          type: string
          description: This field is populated with a Date/Time stamp value when the AlarmEventRecord is created.
          x-support-qualifier:  M
          readOnly:  true
          x-isInvariant:  true
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          format:  date-time
        alarmChangedTime:
          type: string
          description: This field is populated with a Date/Time stamp value when any value of the AlarmEventRecord is modified.
          x-support-qualifier:    M
          x-isAlwaysPresent: false
          readOnly:          true
          x-isInvariant:        true
          x-inventoryNotification:  true
          x-stateChangeNotification:  false
          format:            date-time
        alarmClearedTime:
          type: string
          description: This field is populated with a Date/Time stamp value when the alarm condition is cleared.
          x-support-qualifier:    M
          x-isAlwaysPresent: false
          readOnly:          true
          x-isInvariant:        true
          x-inventoryNotification:  false
          x-stateChangeNotification:  true
          x-nullable:          true
          format:            date-time
        alarmAcknowledgeTime:
          type: string
          description: This field is populated with a Date/Time stamp value when the alarm condition is acknowledged..
          x-support-qualifier:    M
          x-isAlwaysPresent: false
          x-isInvariant:        true
          x-inventoryNotification:  false
          x-stateChangeNotification:  true
          x-nullable:          true
          format:            date-time
        alarmAcknowledged:
          type: boolean
          description: This is a Boolean value defaulted to false. When a system acknowledges an alarm, it is then set to true.
          x-support-qualifier:    M
          x-isInvariant:        false
          x-inventoryNotification:  false
          x-stateChangeNotification:  true
          default:          false
        perceivedSeverity:
          type: string
          description: This is an enumerated set of values which identify the perceived severity of the alarm.
          x-support-qualifier:        M
          x-isInvariant:              false
          x-inventoryNotification:    true
          x-stateChangeNotification:  false
          enum:
            - CRITICAL
            - MAJOR
            - MINOR
            - WARNING
            - INDETERMINATE
            - CLEARED
        extensions:
          type: array
          description: Unspecified (not standardized) properties (keys) which are tailored by the vendor or operator to extend the information provided about the O-Cloud Alarm.
          x-support-qualifier:    M
          x-isAlwaysPresent: false
          x-isInvariant:        false
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          x-nullable:          true
          x-isOrdered:        false
          minItems:          0
          uniqueItems:        true
          items:             
             $ref: 'ORAN.O2ims.Common.yaml#/components/schemas/AttributeValuePair'
      required:
      - alarmEventRecordId
      - resourceTypeId
      - resourceId
      - alarmDefinitionId
      - probableCauseId
      - alarmRaisedTime
      - alarmAcknowledged
      - perceivedSeverity
    AlarmEvent:
      type: object
      properties:
        globalCloudId:
          type: string
          description: Identifier of the O-Cloud instance assigned by the SMO. This identifier is globally unique across O-Cloud instances known to the SMO. This value was provided by the SMO at cloud genesis and is stored in the O-Cloud IMS Inventory.
          x-support-qualifier:    M
          readOnly:          true
          x-isInvariant:        true
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          format:            uuid
        consumerSubscriptionId:
          type: string
          description: Identifier provided by the subscriber for event to subscription traceability within the consumer realm.
          x-support-qualifier:    M
          x-isAlwaysPresent: false
          readOnly:          true
          x-isInvariant:        true
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
        alarmNotificationType:
          type: string
          description: This is an enumerated set of values which identify the type of notification being sent to the subscriber.
          x-support-qualifier:    M
          readOnly:            true
          x-isInvariant:        true
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          enum:
            - NEW
            - CHANGE
            - CLEAR
            - ACKNOWLEDGE
        objectRef:
          type: string
          description: This is a URL entry to the AlarmEventRecord for this notification within the AlarmList.
          x-support-qualifier:    M
          readOnly:          true
          x-isInvariant:        true
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          format:            url
        alarmEventRecord:
          $ref: '#/components/schemas/AlarmEventRecord'
          description: This is a copy of the AlarmEventRecord associated with this event preventing the need for the alarm consumer to do a read after the notification is received.
          x-support-qualifier:    M
          readOnly:          true
          x-isInvariant:        true
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
      required:
      - globalCloudId
      - alarmNotificationType
      - objectRef
      - alarmEventRecord
    AlarmSubscription:
      allOf:
        - $ref: 'ORAN.O2ims.Common.yaml#/components/schemas/InformationObjectClass'
        - type: object
          properties:
            alarmSubscriptionId:
              type: string
              description: Identifier of the subscription. Locally unique within the scope of an O-Cloud instance.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              format:            uuid
            consumerSubscriptionId:
              type: string
              description: The consumer may provide its identifier for tracking, routing, or identifying the subscription used to report the event if a value was provided in the SubscriptionRequest.
              x-support-qualifier:    M
              x-isAlwaysPresent: false
              x-isInvariant:        false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable:          true
            filter:
              type: string
              description: Criteria for events which do not need to be reported or will be filtered by the subscription Criteria for events which do not need to be reported or will be filtered by the subscription notification service. Therefore, if a filter is not provided then all events are reported.
              x-support-qualifier:    M
              x-isAlwaysPresent: false
              x-isInvariant:        false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              enum:
                - NEW
                - CHANGE
                - CLEAR
                - ACKNOWLEDGE
            callback:
              type: string
              description: The URI of the callback to which notifications are delivered to.
              x-support-qualifier:    M
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              format:            url
          required:
          - alarmSubscriptionId
          - callback
    AlarmList:
      allOf:
        - $ref: 'ORAN.O2ims.Common.yaml#/components/schemas/InformationObjectClass'
        - type: object
          properties:
            retentionPeriod:
              type: integer
              description: Specifies the number of days to retain cleared/acknowledge alarms in the AlarmList. Entries in the alarmEventRecords will be at least as long as the retentionPeriod but can be longer depending on the implementation of the purge feature.
              x-support-qualifier:    M
              x-isInvariant:        false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-units:          Days
              minimum:          0
            alarmEventRecords:
              type: array
              description: The alarmEventRecords provides the storage array for AlarmEventRecords that are active or have been cleared but not purged according to the implementation of the purge feature.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  true
              minItems:          0
              uniqueItems:        true
              items:
                $ref: '#/components/schemas/AlarmEventRecord'
            extensions:
              type: array
              description: These are unspecified properties (keys and values) which can be tailored to control the behaviour of the Alarm List.
              x-support-qualifier:    M
              x-isAlwaysPresent: false
              x-isInvariant:        false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable:          true
              x-isOrdered:        false
              minItems:          0
              uniqueItems:        true
              items:
                $ref: 'ORAN.O2ims.Common.yaml#/components/schemas/AttributeValuePair'
          required:
            - retentionPeriod
            - alarmEventRecords
    PerformanceMeasurementStore:
      allOf:
        - $ref: 'ORAN.O2ims.Common.yaml#/components/schemas/InformationObjectClass'
        - type: object
          properties:
            retentionPeriod:
              type: integer
              description: The number in days (24 hours) that measurements will be retained. The exact timing of when measurements are deleted are implementation dependent.
              x-support-qualifier:    M
              x-isInvariant:        false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              format:            uInteger
              x-units:          days
              minimum:          0
            measurements:
              type: array
              description: List of PerformanceMeasurementRecord(s) collected and stored in the performance measurement store.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              minItems:          0
              uniqueItems:        true
              items:
                $ref: '#/components/schemas/PerformanceMeasurementRecord'
            extensions:
              type: array
              description: These are unspecified properties (keys and values) which can be tailored to control the behaviour of the Performance Service.
              x-support-qualifier:    M
              x-isAlwaysPresent: false
              x-isInvariant:        false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable:          true
              x-isOrdered:        false
              minItems:          0
              uniqueItems:        true
              items:  
                $ref: 'ORAN.O2ims.Common.yaml#/components/schemas/AttributeValuePair'
          required:
          - retentionPeriod
          - measurements
    PerformanceMeasurementRecord:
      type: object
      required:
      - performanceMeasurementId
      - resourceId
      - performanceMeasurementDefinitionId
      - timeStamp
      - measurementValue
      properties:
        performanceMeasurementJobId:
          type: string
          description: The job identifier assigned by the O-Cloud when a performance measurement job is created.
          x-support-qualifier:    M
          readOnly:          true
          x-isInvariant:        true
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          format:            uuid
        resourceId:
          type: string
          description: The resource identifier for the resource for which the collected measurement is against.
          x-support-qualifier:    M
          readOnly:          true
          x-isInvariant:        true
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          format:            uuid
        performanceMeasurementDefinitionId:
          type: string
          description: The Performance Dictionary definition identifier for the collected measurement.
          x-support-qualifier:    M
          readOnly:          true
          x-isInvariant:        true
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
        timeStamp:
          type: string
          description: The date and time in which the measurement was collected.
          x-support-qualifier:    M
          readOnly:          true
          x-isInvariant:        false
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          format:            date-time
        measurementValue:
          type: object
          description: The value of the measurement collected. The ValueType represents a variety of types depending on the measurement type.
          x-support-qualifier:    M
          readOnly:          true
          x-isInvariant:        true
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
        isSuspect:
          type: boolean
          description: This flag is set to true if anomalous behaviour was detected on the resource during the last collection interval.
          x-support-qualifier:    M
          x-isAlwaysPresent: false
          readOnly:          true
          x-isInvariant:        false
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          x-nullable:          true
    PerformanceMeasurementJob:
      allOf:
        - $ref: 'ORAN.O2ims.Common.yaml#/components/schemas/InformationObjectClass'
        - type: object
          properties:
            performanceMeasurementJobId:
              type: string
              description: Identifier of the performance job instance within the IMS. This value is assigned by the IMS when the job is created.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              format:            uuid
            consumerPerformanceJobId:
              type: string
              description: Identifier provided by the consumer for its purpose of managing performance jobs. This value could be the same across multiple instances of IMS performance job instances.
              x-support-qualifier:    M
              x-isAlwaysPresent: false
              x-isInvariant:        false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable:          true
            state:
              type: string
              description: The current state of the PerformanceMeasurementJob.
              x-support-qualifier:    M
              x-isInvariant:        false
              x-inventoryNotification:  false
              x-stateChangeNotification:  true
              enum:
                - ACTIVE
                - SUSPENDED
                - DEPRECATED
            collectionInterval:
              type: integer
              description: The interval at which performance measures will be collected and stored.
              x-support-qualifier:    M
              x-isInvariant:        false
              x-inventoryNotification:  false
              x-stateChangeNotification:  true
              x-units:          Seconds
              minimum:          1
              default:          300
            resourceScopeCriteria:
              type: array
              description: Key value pairs of resource attributes which are used to select resources from which measures are to be collected. 
              example: '[{"resourceTypeId","[7c491f8f-7207-4c00-9b67-3d2ee8b008f0, 31040dec-8106-44db-83bc-62e1d618ea17]"}]'
              x-support-qualifier:    M
              x-isAlwaysPresent: false
              x-isInvariant:        false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable: true
              x-isOrdered:        false
              minItems:          0
              uniqueItems:        true
              items:  
                $ref: 'ORAN.O2ims.Common.yaml#/components/schemas/AttributeValuePair'
            measurementSelectionCriteria:
              type: array
              description: Key value pairs that identify the distinct set of measurements within the scope of a PerformanceMeasurementJob. 
              example: '[{"measurementGroup","MemoryUsage"}, {"measurementName","cpuAverageUtilization"}]'
              x-support-qualifier:    M
              x-isInvariant:        false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-isOrdered:        false
              minItems:          1
              uniqueItems:        true
              items:  
                $ref: 'ORAN.O2ims.Common.yaml#/components/schemas/AttributeValuePair'
            status:
              type: string
              description: The current status within the state.
              x-support-qualifier:    M
              x-isInvariant:        false
              x-inventoryNotification:  false
              x-stateChangeNotification:  true
              enum:
                - RUNNING
                - FAILED
                - DEGRADED
                - IDLE
                - PENDING_DELETE
            preInstalledJob:
              type: boolean
              description: This is an indicator if the performance job was created for the IMS (true) or as the result of an IMS consumer request (false).
              x-support-qualifier:    M
              x-isAlwaysPresent: false
              readOnly:          true
              x-isInvariant:        true
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              default: false
            qualifiedResourceTypes:
              type: array
              description: This list is computed from evaluation of the resourceScopeCriteria. The resulting qualifiedResourceTypes are the distinct set of ResourceTypes among those measuredResources. 
              example: '["7c491f8f-7207-4c00-9b67-3d2ee8b008f0", "31040dec-8106-44db-83bc-62e1d618ea17"]'
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-isOrdered:        false
              minItems:          0
              uniqueItems:        true
              items: 
                type: string
            measuredResources:
              type: array
              description: This is the historical list of resources measured by this job. Resources added and deleted are kept track of for the life of the job.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
              x-isOrdered:        false
              minItems:          0
              uniqueItems:        true
              items:  
                $ref: '#/components/schemas/MeasuredResource'
            collectedMeasurements:
              type: array
              description: The historical list of measurements that are or have been collected by this job based on its resourceScopeCriteria and measurementSelectionCriteria over the life of the job.
              x-support-qualifier:    M
              readOnly:          true
              x-isInvariant:        false
              x-inventoryNotification:  true
              x-stateChangeNotification:  false
              x-isOrdered:        false
              minItems:          0
              uniqueItems:        true
              items:
                $ref: '#/components/schemas/CollectedMeasurement'
            extensions:
              type: array
              description: These are unspecified (not standardized) properties (key/value) which extend the information about the Performance Measurement Job.
              x-support-qualifier:  M
              x-isAlwaysPresent: false
              x-isInvariant:  false
              x-inventoryNotification:  false
              x-stateChangeNotification:  false
              x-nullable:          true
              x-isOrdered:        false
              minItems:          0
              uniqueItems:        true
              items:
                $ref: 'ORAN.O2ims.Common.yaml#/components/schemas/AttributeValuePair'
          required:
          - performanceMeasurementJobId
          - consumerPerformanceJobId
          - state
          - collectionInterval
          - resourceScopeCriteria
          - measurementSelectionCriteria
          - status
          - preInstalledJob
          - qualifiedResourceTypes
          - meaasuredResources
          - collectedMeasurements
    MeasuredResource:
      type: object
      properties:
        resourceTypeId:
          type: string
