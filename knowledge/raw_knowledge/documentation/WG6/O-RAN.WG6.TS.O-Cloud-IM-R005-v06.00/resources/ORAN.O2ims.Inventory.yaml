          - performanceSubscriptionId
          - globalSubscriptionCriteria
          - reportFormat
          - measurementReportingFrequencies
    PerformanceReportingFrequency:
      type: object
      required:
      - subscriptionMode
      properties:
        subscriptionCriteria:
          type: array
          items:
             $ref: '#/components/schemas/PerformanceSubscriptionCriteria'
          minItems: 0
          maxItems: 1
          description: This is subscription criteria which will apply to this subscription.
          x-support-qualifier: M
          x-isAlwaysPresent: false
          x-isInvariant: false
          x-inventoryNotification: false
          x-stateChangeNotification: false
          x-nullable: true
        subscriptionMode:
          type: string
          description: An enumerated set of values which will identify the mode in which data is reported.
          x-support-qualifier:  M
          x-isInvariant:  false
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          enum:
            - TARGET_DEFINED
            - ON_CHANGE
            - SAMPLE
        reportInterval:
          type: integer
          description: This is the reporting interval for the data, it is an unsigned integer representing the number of milliseconds between reports. If the reportInterval is lower than the service can provide the subscription shall return an error indicating such. If the value is set to zero (0) then the service will use its lowest supported value for the reportInterval.
          x-support-qualifier:  M
          x-isAlwaysPresent: false
          x-isInvariant:  false
          x-inventoryNotification:  false
          x-stateChangeNotification:  false
          x-nullable:  true
          minimum:  0
          default:  0
          x-units:  milliseconds
        suppressRedundant:
          type: boolean
          description: This flag identifying if SAMPLE values that have not changed shall (false) or shall Not (true) be transmitted.
