externalDocs:
  description: O-RAN.WG6.TS.O-CLOUD-IM; O2 Information Model Specification
  url: https://specifications.o-ran.org/download?id=<>
paths: {}
components: 
  schemas:
    AttributeValuePair:
      type: object
      required:
      - key
      - value
      properties:
        key:
          type: string
        value:
          type: object
          properties: {}  
          
    InformationObjectClass: # Copied from TS28623_GenericNrm.yaml
      type: object
      properties:
        objectClass:
          type: string
        objectInstance:
          type: string
          format: url
      required:
       - objectClass
       - objectInstance
    Ipv4Addr:
      type: object
      required:
      - ipv4Addr
      properties:
        ipv4Addr:
          type: string
          pattern: '^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$'
          example: '198.51.100.1'
    Ipv6Addr:
      type: object
      required:
      - ipv6Addr
      properties:
        ipv6Addr:
          type: string
          allOf:
            - pattern: '^((:|(0?|([1-9a-f][0-9a-f]{0,3}))):)((0?|([1-9a-f][0-9a-f]{0,3})):){0,6}(:|(0?|([1-9a-f][0-9a-f]{0,3})))$'
            - pattern: '^((([^:]+:){7}([^:]+))|((([^:]+:)*[^:]+)?::(([^:]+:)*[^:]+)?))$'
          example: '2001:db8:85a3::8a2e:370:7334'
          