services:
  webui:
    build: .
    container_name: agent-chat-ui
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      # Mount the local codebase for hot-reloading
      - .:/app
      # Prevent host from overwriting container's node_modules
      - /app/node_modules
    restart: unless-stopped
