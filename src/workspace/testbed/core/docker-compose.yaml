    #             ipv4_address: 192.168.0.200

networks:
    core_network:
        driver: bridge
        name: core_network
        ipam:
            config:
                - subnet: 192.168.0.0/24
        driver_opts:
            com.docker.network.bridge.name: "core_network"
    
    inter_net:
        driver: bridge
        name: inter_net
        ipam:
            config:
                - subnet: 192.168.1.0/24
        driver_opts:
            com.docker.network.bridge.name: "inter_net"
    
    n6_network:
        driver: bridge
        name: n6_network
        ipam:
            config:
                - subnet: 192.168.6.0/24
        driver_opts:
            com.docker.network.bridge.name: "n6_network"

